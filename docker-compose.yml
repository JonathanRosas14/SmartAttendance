services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: attendgo-db
    environment:
      POSTGRES_USER: ${DB_USER:-attendgo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-attendgo}
      TZ: America/Bogota
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-attendgo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - attendgo-net
    restart: unless-stopped

  # Backend Node.js
  backend:
    build:
      context: ./AttendGo-backend
      dockerfile: Dockerfile
    container_name: attendgo-backend
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-attendgo}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:-attendgo}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8081,http://localhost:19000,http://localhost:19006}
      PORT: 5000
      TZ: America/Bogota
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./AttendGo-backend:/app
      - /app/node_modules
      - /etc/localtime:/etc/localtime:ro
    networks:
      - attendgo-net
    restart: unless-stopped

  # Frontend Expo
  app:
    build:
      context: ./AttendGo-app
      dockerfile: Dockerfile
    container_name: attendgo-app
    environment:
      EXPO_PUBLIC_API_URL: http://backend:5000/api
      NODE_ENV: development
      TZ: America/Bogota
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
    depends_on:
      - backend
    volumes:
      - ./AttendGo-app:/app
      - /app/node_modules
      - /etc/localtime:/etc/localtime:ro
    networks:
      - attendgo-net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  attendgo-net:
    driver: bridge
